# GroupAlarm Monitor v5.6
# Installed to /etc/NetworkManager/conf.d/10-groupalarm-powersave.conf
#
# Disables WLAN power saving globally. A WLAN chip that enters power-save is a
# very common cause of "the connection suddenly drops" on always-on kiosks.
# 2 = disable power saving.
[connection]
wifi.powersave=2
