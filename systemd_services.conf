# GroupAlarm Monitor - Service-Referenz v5.6
#
# Diese Datei dokumentiert die fuer 5.6 vorgesehenen Service-Dateien
# und ersetzt die alte Browser-zentrierte systemd-Architektur.
#
# Neu in 5.6:
# - groupalarm-auto-update.timer/.service: woechentliches Update via systemd
#   (Persistent=true holt verpasste Laeufe beim naechsten Boot nach). Der alte
#   Cron-Weg entfaellt.
# - Netzwerk-Watchdog erkennt NetworkManager und heilt per nmcli; ifupdown/
#   wpa_supplicant bleibt Fallback. Sandbox-Optionen (NoNewPrivileges,
#   ProtectSystem=strict) wurden entfernt, weil sie die sudo-Recovery blockierten.
# - groupalarm-wifi-setup.sh legt WLAN systemweit ab (psk-flags=0), damit der
#   Kiosk ohne Login und ohne Keyring-Entsperrung verbindet.

# ============================================================================
# 1. AKTIVER WEBINTERFACE-SERVICE
# ============================================================================

# Datei: /etc/systemd/system/groupalarm-webinterface.service
# Funktion: Flask Web-Interface auf Port 8080
# Benutzer: groupalarm
# Auto-Start: Ja

[Unit]
Description=GroupAlarm Monitor Web Interface v5.6
After=network.target

[Service]
Type=simple
User=groupalarm
Group=groupalarm
WorkingDirectory=/usr/local/bin
Environment="HOME=/home/groupalarm"
ExecStart=/usr/bin/python3 /usr/local/bin/groupalarm-webinterface.py
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target


# ============================================================================
# 2. AKTIVER NETWORK-WATCHDOG-SERVICE
# ============================================================================

# Datei: /etc/systemd/system/groupalarm-network-watchdog.service
# Funktion: Erkennung von Netzwerkausfaellen und automatische WLAN-Recovery
# Benutzer: groupalarm
# Auto-Start: Ja

[Unit]
Description=GroupAlarm Monitor Network Watchdog v5.6
After=network-online.target groupalarm-webinterface.service
Wants=network-online.target

[Service]
Type=simple
User=groupalarm
Group=groupalarm
Environment="HOME=/home/groupalarm"
Environment="GROUPALARM_NETWORK_INTERFACE=wlan0"
WorkingDirectory=/usr/local/bin
ExecStart=/usr/local/bin/groupalarm-network-watchdog.sh
Restart=always
RestartSec=10
StandardOutput=journal
StandardError=journal
NoNewPrivileges=true
PrivateTmp=true
ProtectSystem=strict
ProtectHome=read-only
ReadWritePaths=/home/groupalarm/.groupalarm-monitor

[Install]
WantedBy=multi-user.target


# ============================================================================
# 3. AKTIVER HEARTBEAT-TIMER FUER EXTERNEN WATCHER
# ============================================================================

# Datei: /etc/systemd/system/groupalarm-heartbeat.service
# Datei: /etc/systemd/system/groupalarm-heartbeat.timer
# Funktion: Sendet alle 60 Sekunden einen Heartbeat an den externen Watcher
# Benutzer: groupalarm
# Auto-Start: Ja, ueber Timer

[Unit]
Description=GroupAlarm Monitor External Watcher Heartbeat v5.6
After=network-online.target
Wants=network-online.target

[Service]
Type=oneshot
User=groupalarm
Group=groupalarm
Environment="HOME=/home/groupalarm"
WorkingDirectory=/usr/local/bin
ExecStart=/usr/local/bin/groupalarm-heartbeat.sh
StandardOutput=journal
StandardError=journal
NoNewPrivileges=true
PrivateTmp=true
ProtectSystem=strict
ProtectHome=read-only
ReadWritePaths=/home/groupalarm/.groupalarm-monitor

[Unit]
Description=Run GroupAlarm Monitor External Watcher Heartbeat every minute

[Timer]
OnBootSec=90
OnUnitActiveSec=60
AccuracySec=10
Persistent=true
Unit=groupalarm-heartbeat.service

[Install]
WantedBy=timers.target


# ============================================================================
# 4. LEGACY-KOMPATIBILITAETS-STUB
# ============================================================================

# Datei: /etc/systemd/system/groupalarm-monitor.service
# Funktion: Nur Alt-/Kompatibilitaetshinweis
# WICHTIG: Fuehrt in 5.5 nicht mehr Chromium

[Unit]
Description=GroupAlarm Monitor Legacy Compatibility Stub v5.6
Documentation=Browser control moved to Openbox autostart + /usr/local/bin/groupalarm-kiosk.sh
After=display-manager.service

[Service]
Type=oneshot
User=groupalarm
Group=groupalarm
Environment="HOME=/home/groupalarm"
ExecStart=/bin/sh -c 'echo "groupalarm-monitor.service is deprecated in v5.6; Chromium is managed by Openbox and groupalarm-kiosk.sh."'
RemainAfterExit=yes
StandardOutput=journal
StandardError=journal

# Intentionally no [Install] section.


# ============================================================================
# 5. BROWSERSTART IN 5.5
# ============================================================================

# Chromium wird in 5.5 nicht mehr ueber systemd gefuehrt.
#
# Verantwortlich sind:
# - /home/groupalarm/.config/openbox/autostart
# - /usr/local/bin/groupalarm-kiosk.sh
#
# Openbox ruft genau einmal auf:
#   /usr/local/bin/groupalarm-kiosk.sh start


# ============================================================================
# 6. TYPISCHE BEFEHLE
# ============================================================================

# Webinterface Status:
#   sudo systemctl status groupalarm-webinterface.service
#
# Webinterface Neustart:
#   sudo systemctl restart groupalarm-webinterface.service
#
# Watchdog Status:
#   sudo systemctl status groupalarm-network-watchdog.service
#
# Watchdog Neustart:
#   sudo systemctl restart groupalarm-network-watchdog.service
#
# Externer Watcher Heartbeat Timer:
#   sudo systemctl status groupalarm-heartbeat.timer
#
# Externer Watcher Heartbeat manuell:
#   sudo systemctl start groupalarm-heartbeat.service
#
# Kiosk Status:
#   /usr/local/bin/groupalarm-kiosk.sh status
#
# Kiosk Neustart:
#   /usr/local/bin/groupalarm-kiosk.sh restart
#
# Kiosk Stop:
#   /usr/local/bin/groupalarm-kiosk.sh stop
#
# Kiosk Start:
#   /usr/local/bin/groupalarm-kiosk.sh start


# ============================================================================
# 7. SUDOERS-HINWEIS
# ============================================================================

# In 5.5 werden nur wirklich benoetigte privilegierte Befehle freigegeben.
# Browsersteuerung ueber systemctl start/stop/restart groupalarm-monitor.service
# ist nicht mehr Bestandteil des Zielmodells.
# Fuer die Netzwerk-Selbstheilung bekommt der Watchdog gezielte Rechte fuer:
# - nmcli (NetworkManager: radio on, connection up, device reconnect)
# - iw dev <interface> set power_save off
# - systemctl restart wpa_supplicant / wpa_supplicant@<interface> (Fallback)
# - dhclient (Fallback)
# - ip link set <interface> up|down (Fallback)
#
# Auto-Update-Zeitplan:
# Das Webinterface ruft ueber sudo groupalarm-apply-update-schedule.sh auf,
# um OnCalendar der groupalarm-auto-update.timer aus config.json neu zu setzen.


# ============================================================================
# 8. FEHLERBEHEBUNG
# ============================================================================

# Problem: Web-Interface nicht erreichbar
# Loesung:
#   1. sudo systemctl status groupalarm-webinterface.service
#   2. journalctl -u groupalarm-webinterface.service -n 50
#   3. sudo netstat -tuln | grep 8080
#
# Problem: Chromium startet nicht im Kiosk
# Loesung:
#   1. cat /home/groupalarm/.config/openbox/autostart
#   2. /usr/local/bin/groupalarm-kiosk.sh status
#   3. /usr/local/bin/groupalarm-kiosk.sh restart
#   4. journalctl -b | grep -i groupalarm
#
# Problem: Nach Dashboard-Restart kein Fullscreen
# Loesung:
#   1. Sicherstellen, dass kein alter browserfuehrender groupalarm-monitor.service aktiv ist
#   2. Nur /usr/local/bin/groupalarm-kiosk.sh restart verwenden
#   3. Openbox-Autostart und Kiosk-Skript auf 5.5-Stand pruefen
#
# Problem: Netzwerk-Watchdog heilt Verbindung nicht
# Loesung:
#   1. sudo systemctl status groupalarm-network-watchdog.service
#   2. journalctl -u groupalarm-network-watchdog.service -n 50
#   3. pruefen, ob die Ziel-Schnittstelle als wlan0 oder ueber GROUPALARM_NETWORK_INTERFACE gesetzt ist
#   4. sudo -l -U groupalarm auf die freigegebenen Recovery-Kommandos pruefen
#
# Problem: Externer Watcher zeigt Ausfall
# Loesung:
#   1. Dashboard-Konfiguration watcher_enabled, watcher_url und watcher_token pruefen
#   2. sudo systemctl status groupalarm-heartbeat.timer
#   3. sudo systemctl start groupalarm-heartbeat.service
#   4. tail -n 50 /home/groupalarm/.groupalarm-monitor/groupalarm-heartbeat.log
