<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GroupAlarm Monitor - Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(255, 107, 87, 0.18), transparent 40%),
                linear-gradient(160deg, #111827, #0b1220);
            color: #e2e8f0;
        }

        .card {
            width: min(420px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 8px;
            color: #ff6b57;
        }

        p {
            color: #94a3b8;
            line-height: 1.5;
            margin: 0 0 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            margin-bottom: 16px;
            /* >=16px stops iOS Safari from auto-zooming when the field is focused. */
            font-size: 16px;
            line-height: 1.3;
        }

        input:focus {
            outline: none;
            border-color: #ff6b57;
        }

        button {
            width: 100%;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff6b57, #d64541);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        .error {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.45);
            color: #fecaca;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>GroupAlarm Monitor</h1>
        <p>Administrationszugang fuer Kiosk, Konfiguration und Systemaktionen.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            <!-- Username field gives iOS/Android password managers a credential to
                 associate with this site; the backend only checks the password. -->
            <label for="username">Benutzer</label>
            <input id="username" name="username" type="text" value="admin"
                   autocomplete="username" autocapitalize="none" autocorrect="off"
                   spellcheck="false" inputmode="text">
            <label for="password">Admin-Passwort</label>
            <input id="password" name="password" type="password" required autofocus
                   autocomplete="current-password" autocapitalize="none" autocorrect="off"
                   spellcheck="false">
            <button type="submit">Anmelden</button>
        </form>
    </div>
</body>
</html>
